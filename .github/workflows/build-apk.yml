name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git \
            autoconf automake libtool \
            python3-pip zip unzip wget curl \
            openjdk-17-jdk-headless

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==3.1.2

      - name: Accept Android licenses
        run: |
          # Run buildozer until SDK is downloaded (it will fail, that's OK)
          buildozer android debug 2>&1 || true

          # Create license files to bypass interactive prompts
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          LICENSES_DIR="$SDK_DIR/licenses"
          mkdir -p "$LICENSES_DIR"

          # Accept all licenses by writing the accepted license hashes
          # android-googledisplay-license
          echo -e "\n8933bad161af4178b1167d1a76312767c93130d5e0b931f0b1e9f5e9a9b0b0f0" > "$LICENSES_DIR/android-sdk-license"
          echo -e "\n8933bad161af4178b1167d1a76312767c93130d5e0b931f0b1e9f5e9a9b0b0f0" > "$LICENSES_DIR/android-sdk-preview-license"

          # Accept using sdkmanager if available
          if command -v sdkmanager &> /dev/null; then
            yes | sdkmanager --licenses --sdk_root="$SDK_DIR" 2>/dev/null || true
          fi

      - name: Build APK
        run: buildozer android debug
        env:
          CI: "true"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-error-log
          path: buildozer.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BubbleTech-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Create Release
        if: github.event_name == 'push' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: bin/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
