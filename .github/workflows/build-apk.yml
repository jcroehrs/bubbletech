name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git \
            autoconf automake libtool \
            python3-pip zip unzip wget curl \
            openjdk-17-jdk-headless \
            || { echo "=== APT ERROR DETAILS ===" && cat /var/log/apt/term.log && exit 1; }
        shell: bash

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==3.1.2

      - name: Build APK
        run: |
          echo "=== Starting buildozer ==="
          buildozer android debug 2>&1 | tee buildozer.log || {
            echo "=== BUILD FAILED - Last 200 lines ==="
            tail -200 buildozer.log
            exit 1
          }
        env:
          CI: "true"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BubbleTech-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: bin/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
