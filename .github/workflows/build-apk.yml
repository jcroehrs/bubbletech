name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git \
            autoconf automake libtool \
            python3-pip zip unzip wget curl \
            openjdk-17-jdk-headless

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install 'setuptools==65.5.0'
          pip install 'cython<3.0'
          pip install 'buildozer==1.5.0'

      - name: Install Android SDK command-line tools
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extract
          mv /tmp/cmdline-tools-extract/cmdline-tools $SDK_DIR/cmdline-tools/latest
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools-extract

      - name: Accept Android SDK licenses
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$SDK_DIR < /dev/null || true
          mkdir -p $SDK_DIR/licenses
          {
            echo "8933bad161af4178b1185d1a37fbf41ea5269c55"
            echo "d56f5187479451eabf01fb78af6dfcb131a6481e"
            echo "24333f8a63b6825ea9c5514f83c2829b004d1fee"
            echo "504667f4c0de7af1a06de9e4bda8324a6bc5a8e3"
            echo "48bc78e2beda406a4b6fd4b79e8d260aec5472c3"
          } > $SDK_DIR/licenses/android-sdk-license

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BubbleTech-APK
          path: ${{ github.workspace }}/bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-error-log
          path: buildozer.log
