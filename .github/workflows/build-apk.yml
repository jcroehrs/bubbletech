name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git \
            autoconf automake libtool \
            python3-pip zip unzip wget curl \
            openjdk-17-jdk-headless

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install 'setuptools==65.5.0'
          pip install 'cython<3.0'
          pip install 'buildozer==1.5.0'

      - name: Setup Android SDK & cmdline-tools
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk

          # 1. Descargar cmdline-tools de Google
          mkdir -p $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-extract
          mv /tmp/cmdline-extract/cmdline-tools $SDK_DIR/cmdline-tools/latest

          # 2. Crear compatibilidad: buildozer busca en tools/bin/sdkmanager
          #    pero la ruta real es cmdline-tools/latest/bin/sdkmanager
          mkdir -p $SDK_DIR/tools/bin
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager

          # 3. Crear archivo de licencias aceptadas
          mkdir -p $SDK_DIR/licenses
          {
            echo "8933bad161af4178b1185d1a37fbf41ea5269c55"
            echo "d56f5187479451eabf01fb78af6dfcb131a6481e"
            echo "24333f8a63b6825ea9c5514f83c2829b004d1fee"
          } > $SDK_DIR/licenses/android-sdk-license

          # 4. Instalar platform-tools y build-tools con sdkmanager
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$SDK_DIR \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" || true

          # Limpiar
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-extract

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BubbleTech-APK
          path: ${{ github.workspace }}/bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-error-log
          path: buildozer.log
